services:
  - type: web
    name: feedsense-ml
    env: python
    pythonVersion: 3.11
    plan: free
    branch: main
    repo: https://github.com/anandrajkcet09/Feed-Sense-ML
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10001
    envVars:
      - key: PORT
        value: 10001
      - key: ALLOWED_ORIGINS
        value: "*"
