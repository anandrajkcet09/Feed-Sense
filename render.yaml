services:
  - type: web
    name: feed-sense-server
    env: node
    plan: free
    branch: main
    repo: https://github.com/anandrajkcet09/Feed-Sense
    buildCommand: |
      cd client && npm ci && npm run build
      cd ../server && npm ci
    startCommand: cd server && npm start
    envVars: []
  - type: web
    name: feed-sense-ml-service
    env: python
    plan: free
    branch: main
    repo: https://github.com/anandrajkcet09/Feed-Sense
    buildCommand: |
      cd ml-service && pip install -r requirements.txt
    startCommand: cd ml-service && uvicorn main:app --host 0.0.0.0 --port 5001
    envVars: []
